<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HBD Deen!</title>
    <link type="text/css" rel="stylesheet" href="./file/default.css">
    <style>
        /* Gituyo ni para sa Phone */
        body {
            margin: 0;
            padding: 0;
            background: #ffe;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #main { width: 100%; height: 100vh; position: relative; }
        #wrap { width: 100%; position: relative; margin-top: 20px; }
        
        /* Mobile-friendly text */
        #text {
            width: 90%;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
            z-index: 100;
            position: relative;
        }
        
        /* Canvas adjust para sa screen */
        #canvas {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }

        #clock-box {
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="main">
        <audio autoplay="autoplay" id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
        </audio>

        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">Happy Birthday! 🎈</span><br>
                    <span class="say">Sorry kaayo ganiha ha,</span><br>
                    <span class="say">murag loading pa gyud ko</span><br>
                    <span class="say">pag-good morning nako nimo. 😅</span><br><br>
                    <span class="say">Happy birthday, <b>Deen</b>! 🎂</span><br>
                    <span class="say">Unta nindot imong adlaw diha</span><br>
                    <span class="say">uban imong family. ✨</span><br><br>
                    <span class="say">Bisag layo ko,</span><br>
                    <span class="say">I'm cheering for you today. ❤️</span>
                </div>
            </div>
            <div id="clock-box">
                <span>Enjoy your special day, Deen! ✨</span>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script type="text/javascript" src="./file/jquery.min.js"></script>
    <script type="text/javascript" src="./file/jscex.min.js"></script>
    <script type="text/javascript" src="./file/jscex-parser.js"></script>
    <script type="text/javascript" src="./file/jscex-jit.js"></script>
    <script type="text/javascript" src="./file/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="./file/jscex-async.min.js"></script>
    <script type="text/javascript" src="./file/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="./file/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./file/love.js" charset="utf-8"></script>

    <script>
        // Automatic screen detection
        var canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth > 500 ? 500 : window.innerWidth;
        canvas.height = 400; // Mas mubo para sa phone

        // Ang logic sa pag-play sa audio kung i-click
        $(document).click(function() {
            document.getElementById("myAudio").play();
        });
        
        // I-copy ang "Tree logic" gikan sa imong original index.html diri...
        // (Sumpayi sa script gikan sa line 100 sa imong file)
    </script>
</body>
</html>
