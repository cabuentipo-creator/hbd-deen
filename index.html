<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1100">
    <title>HBD Deen! ✨</title>
    
    <script type="text/javascript" src="jquery.min.js"></script>
    <script type="text/javascript" src="jscex.min.js"></script>
    <script type="text/javascript" src="jscex-parser.js"></script>
    <script type="text/javascript" src="jscex-jit.js"></script>
    <script type="text/javascript" src="jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="jscex-async.min.js"></script>
    <script type="text/javascript" src="jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="love.js" charset="utf-8"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6eb;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Para walay scroll-scroll */
        }
        #main {
            width: 1100px; /* Naka-lock para saktong saktong pwesto sa bulak */
            height: 680px;
            margin: 0 auto;
            position: relative;
        }
        #wrap {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Gipadak-an ang text para mabasa og tarong sa phone */
        #text {
            position: absolute;
            left: 100px;
            top: 100px;
            width: 450px;
            color: #d63384;
            font-size: 26px; 
            line-height: 1.6;
            font-weight: bold;
            z-index: 999;
        }
        #code { display: none; }
        #clock-box {
            position: absolute;
            left: 50%;
            top: 40px;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: 32px;
            font-weight: bold;
            z-index: 999;
        }
        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 1100px;
            height: 680px;
        }
    </style>
</head>
<body>
    <div id="main">
        <audio id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
        </audio>
        
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">Happy Birthday! 🎈</span><br>
                    <span class="say">Sorry kaayo ganiha ha,</span><br>
                    <span class="say">murag loading pa gyud ko</span><br>
                    <span class="say">pag-good morning nako nimo. 😅</span><br><br>
                    <span class="say">Happy birthday, <b>Deen</b>! 🎂</span><br>
                    <span class="say">Unta nindot imong adlaw diha</span><br>
                    <span class="say">uban imong family. ✨</span><br><br>
                    <span class="say">Bisag layo ko,</span><br>
                    <span class="say">I'm cheering for you today. ❤️</span>
                </div>
            </div>
            
            <div id="clock-box">
                Enjoy your special day, Deen! ✨ (I-click ang screen!)
            </div>
            
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
        var width = 1100;
        var height = 680;
        
        var opts = {
            seed: { x: 535, color: "rgb(190, 26, 37)", scale: 2 },
            branch: [ [535, 680, 570, 250, 500, 200, 30, 100, [ [540, 500, 455, 417, 340, 400, 13, 100, [ [450, 435, 434, 430, 394, 395, 2, 40] ] ], [550, 445, 600, 356, 680, 345, 12, 100, [ [578, 400, 648, 409, 661, 426, 3, 80] ] ], [539, 281, 537, 248, 534, 217, 3, 40], [546, 397, 413, 247, 328, 244, 9, 80, [ [427, 286, 383, 253, 371, 205, 2, 40], [498, 345, 435, 315, 395, 330, 4, 60] ] ], [546, 357, 608, 252, 678, 221, 6, 100, [ [590, 293, 646, 277, 648, 271, 2, 80] ] ] ] ] ],
            bloom: { num: 700, width: 1080, height: 650 },
            footer: { width: 1200, height: 5, speed: 10 }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var hold = 1;

        canvas.click(function(e) {
            document.getElementById("myAudio").play();
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left; y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; canvas.unbind("click"); canvas.unbind("mousemove"); canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left; y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) { $await(Jscex.Async.sleep(10)); }
            while (seed.canScale()) { seed.scale(0.95); $await(Jscex.Async.sleep(10)); }
            while (seed.canMove()) { seed.move(0, 2); $await(Jscex.Async.sleep(10)); }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do { tree.grow(); $await(Jscex.Async.sleep(10)); } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do { tree.flower(2); $await(Jscex.Async.sleep(10)); } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) { $await(Jscex.Async.sleep(10)); }
            tree.snapshot("p2", 500, 0, 610, 680);
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show().typewriter();
        }));
        
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
    </script>
</body>
</html>
